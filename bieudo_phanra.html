<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <title>Biểu đồ Use Case Phân Rã</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Times+New+Roman&display=swap');
    body {
      background: #f4f4f4;
      font-family: 'Times New Roman', serif;
      padding: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 50px;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 10px;
    }
    .diagram-container {
      background: white;
      padding: 30px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      border: 1px solid #ddd;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    svg {
      background: white;
    }
    .caption {
      margin-top: 15px;
      font-size: 18px;
      font-style: italic;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>PHÂN RÃ TỪ HÌNH 2.1: BIỂU ĐỒ TỔNG QUÁT</h1>

  <!-- ===============================
       HÌNH 2.2: QUẢN LÝ TÀI KHOẢN
       =============================== -->
  <div class="diagram-container">
    <svg width="450" height="350" viewBox="0 0 450 350">
      <defs>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
          <path d="M0,0 L0,6 L9,3 z" fill="none" stroke="black" />
        </marker>
      </defs>

      <!-- System Boundary -->
      <rect x="25" y="25" width="280" height="300" fill="none" stroke="black" stroke-width="1.5"/>
      <text x="165" y="45" text-anchor="middle" font-size="16" font-weight="bold">Hệ thống</text>

      <!-- Use Cases -->
      <ellipse cx="165" cy="120" rx="100" ry="30" fill="none" stroke="black" stroke-width="1.5"/>
      <text x="165" y="125" text-anchor="middle" font-size="15">Đăng nhập / Đăng ký</text>

      <ellipse cx="165" cy="230" rx="100" ry="30" fill="none" stroke="black" stroke-width="1.5"/>
      <text x="165" y="235" text-anchor="middle" font-size="15">Đăng xuất</text>

      <!-- Actor -->
      <g transform="translate(360, 150)">
        <circle cx="0" cy="-30" r="12" fill="none" stroke="black" stroke-width="1.5"/>
        <line x1="0" y1="-18" x2="0" y2="20" stroke="black" stroke-width="1.5"/>
        <line x1="-20" y1="-5" x2="20" y2="-5" stroke="black" stroke-width="1.5"/>
        <line x1="0" y1="20" x2="-15" y2="45" stroke="black" stroke-width="1.5"/>
        <line x1="0" y1="20" x2="15" y2="45" stroke="black" stroke-width="1.5"/>
        <text x="0" y="65" text-anchor="middle" font-size="15">Người dùng</text>
      </g>

      <!-- Connections -->
      <line x1="265" y1="120" x2="335" y2="140" stroke="black" stroke-width="1.5"/>
      <line x1="265" y1="230" x2="335" y2="160" stroke="black" stroke-width="1.5"/>
    </svg>
    <div class="caption">Hình 2.2 Biểu đồ Use Case - Tài khoản</div>
  </div>

  <!-- ===============================
       HÌNH 2.3: DUYỆT BÀI VIẾT
       =============================== -->
  <div class="diagram-container">
    <svg width="500" height="600" viewBox="0 0 500 600">
      <defs>
        <marker id="arrow_dashed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
          <path d="M0,0 L0,6 L9,3 z" fill="none" stroke="black" />
        </marker>
      </defs>

      <!-- System Boundary -->
      <rect x="25" y="25" width="310" height="550" fill="none" stroke="black" stroke-width="1.5"/>
      <text x="180" y="45" text-anchor="middle" font-size="16" font-weight="bold">Hệ thống</text>

      <!-- Use Cases -->
      <ellipse cx="180" cy="90" rx="100" ry="25" fill="none" stroke="black" stroke-width="1.5" stroke-dasharray="4"/>
      <text x="180" y="95" text-anchor="middle" font-size="14">Đăng nhập / Đăng ký</text>

      <ellipse cx="180" cy="180" rx="100" ry="25" fill="none" stroke="black" stroke-width="1.5"/>
      <text x="180" y="185" text-anchor="middle" font-size="15">Xem trang chủ</text>

      <!-- Include arrow -->
      <path d="M180,155 L180,120" fill="none" stroke="black" stroke-width="1.5" stroke-dasharray="5,5" marker-end="url(#arrow_dashed)"/>
      <text x="185" y="142" font-size="13" font-style="italic">«include»</text>

      <ellipse cx="180" cy="260" rx="100" ry="25" fill="none" stroke="black" stroke-width="1.5"/>
      <text x="180" y="265" text-anchor="middle" font-size="15">Lọc danh mục bài viết</text>

      <ellipse cx="180" cy="340" rx="100" ry="25" fill="none" stroke="black" stroke-width="1.5"/>
      <text x="180" y="345" text-anchor="middle" font-size="15">Xem bài nổi bật</text>

      <ellipse cx="180" cy="420" rx="100" ry="25" fill="none" stroke="black" stroke-width="1.5"/>
      <text x="180" y="425" text-anchor="middle" font-size="15">Xem chi tiết bài viết</text>

      <ellipse cx="180" cy="500" rx="100" ry="25" fill="none" stroke="black" stroke-width="1.5"/>
      <text x="180" y="505" text-anchor="middle" font-size="15">Tìm kiếm bài viết</text>

      <!-- Actor -->
      <g transform="translate(410, 300)">
        <circle cx="0" cy="-30" r="12" fill="none" stroke="black" stroke-width="1.5"/>
        <line x1="0" y1="-18" x2="0" y2="20" stroke="black" stroke-width="1.5"/>
        <line x1="-20" y1="-5" x2="20" y2="-5" stroke="black" stroke-width="1.5"/>
        <line x1="0" y1="20" x2="-15" y2="45" stroke="black" stroke-width="1.5"/>
        <line x1="0" y1="20" x2="15" y2="45" stroke="black" stroke-width="1.5"/>
        <text x="0" y="65" text-anchor="middle" font-size="15">Người dùng</text>
      </g>

      <!-- Connections -->
      <line x1="280" y1="180" x2="380" y2="280" stroke="black" stroke-width="1.5"/>
      <line x1="280" y1="260" x2="380" y2="290" stroke="black" stroke-width="1.5"/>
      <line x1="280" y1="340" x2="380" y2="300" stroke="black" stroke-width="1.5"/>
      <line x1="280" y1="420" x2="380" y2="310" stroke="black" stroke-width="1.5"/>
      <line x1="280" y1="500" x2="380" y2="320" stroke="black" stroke-width="1.5"/>
    </svg>
    <div class="caption">Hình 2.3 Biểu đồ Use Case - Xem bài viết</div>
  </div>

  <!-- ===============================
       HÌNH 2.4: TƯƠNG TÁC & ĐĂNG BÀI
       =============================== -->
  <div class="diagram-container">
    <svg width="480" height="520" viewBox="0 0 480 520">
      <defs>
        <marker id="arrow_d" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
          <path d="M0,0 L0,6 L9,3 z" fill="none" stroke="black" />
        </marker>
      </defs>

      <!-- System Boundary -->
      <rect x="25" y="25" width="280" height="470" fill="none" stroke="black" stroke-width="1.5"/>
      <text x="165" y="45" text-anchor="middle" font-size="16" font-weight="bold">Hệ thống</text>

      <!-- Use Cases -->
      <ellipse cx="165" cy="90" rx="100" ry="25" fill="none" stroke="black" stroke-width="1.5" stroke-dasharray="4"/>
      <text x="165" y="95" text-anchor="middle" font-size="14">Đăng nhập / Đăng ký</text>

      <ellipse cx="165" cy="180" rx="100" ry="25" fill="none" stroke="black" stroke-width="1.5"/>
      <text x="165" y="185" text-anchor="middle" font-size="15">React / Thích bài</text>

      <!-- Include -->
      <path d="M165,155 L165,120" fill="none" stroke="black" stroke-width="1.5" stroke-dasharray="5,5" marker-end="url(#arrow_d)"/>
      <text x="170" y="142" font-size="13" font-style="italic">«include»</text>

      <ellipse cx="165" cy="260" rx="100" ry="25" fill="none" stroke="black" stroke-width="1.5"/>
      <text x="165" y="265" text-anchor="middle" font-size="15">Bình luận bài viết</text>
      
      <!-- Include curve to Đăng nhập -->
      <path d="M75,250 Q10,170 75,100" fill="none" stroke="black" stroke-width="1.5" stroke-dasharray="5,5" marker-end="url(#arrow_d)"/>
      <text x="12" y="175" font-size="13" font-style="italic" transform="rotate(-60, 20, 180)">«include»</text>

      <ellipse cx="165" cy="350" rx="100" ry="25" fill="none" stroke="black" stroke-width="1.5"/>
      <text x="165" y="355" text-anchor="middle" font-size="15">Chia sẻ bài viết</text>

      <ellipse cx="165" cy="440" rx="100" ry="25" fill="none" stroke="black" stroke-width="1.5"/>
      <text x="165" y="445" text-anchor="middle" font-size="15">Đăng bài mới</text>
      
      <!-- Include curve to Đăng nhập (from Đăng bài) -->
      <path d="M260,430 Q330,260 260,105" fill="none" stroke="black" stroke-width="1.5" stroke-dasharray="5,5" marker-end="url(#arrow_d)"/>
      <text x="315" y="265" font-size="13" font-style="italic" transform="rotate(70, 310, 260)">«include»</text>

      <!-- Actor -->
      <g transform="translate(400, 280)">
        <circle cx="0" cy="-30" r="12" fill="none" stroke="black" stroke-width="1.5"/>
        <line x1="0" y1="-18" x2="0" y2="20" stroke="black" stroke-width="1.5"/>
        <line x1="-20" y1="-5" x2="20" y2="-5" stroke="black" stroke-width="1.5"/>
        <line x1="0" y1="20" x2="-15" y2="45" stroke="black" stroke-width="1.5"/>
        <line x1="0" y1="20" x2="15" y2="45" stroke="black" stroke-width="1.5"/>
        <text x="0" y="65" text-anchor="middle" font-size="15">Người dùng</text>
      </g>

      <!-- Connections -->
      <line x1="265" y1="180" x2="370" y2="250" stroke="black" stroke-width="1.5"/>
      <line x1="265" y1="260" x2="370" y2="260" stroke="black" stroke-width="1.5"/>
      <line x1="265" y1="350" x2="370" y2="270" stroke="black" stroke-width="1.5"/>
      <line x1="265" y1="440" x2="370" y2="290" stroke="black" stroke-width="1.5"/>
    </svg>
    <div class="caption">Hình 2.4 Biểu đồ Use Case - Tương tác và Đăng bài</div>
  </div>

  <!-- ===============================
       HÌNH 2.5: CÀI ĐẶT & THÔNG BÁO
       =============================== -->
  <div class="diagram-container">
    <svg width="460" height="350" viewBox="0 0 460 350">
      <!-- System Boundary -->
      <rect x="25" y="25" width="300" height="300" fill="none" stroke="black" stroke-width="1.5"/>
      <text x="175" y="45" text-anchor="middle" font-size="16" font-weight="bold">Hệ thống</text>

      <!-- Use Cases -->
      <ellipse cx="175" cy="110" rx="100" ry="30" fill="none" stroke="black" stroke-width="1.5"/>
      <text x="175" y="115" text-anchor="middle" font-size="15">Xem thông báo</text>

      <ellipse cx="175" cy="220" rx="130" ry="35" fill="none" stroke="black" stroke-width="1.5"/>
      <text x="175" y="215" text-anchor="middle" font-size="15">Cài đặt</text>
      <text x="175" y="235" text-anchor="middle" font-size="13">(Ngôn ngữ, Cỡ chữ, Dark Mode)</text>

      <!-- Actor -->
      <g transform="translate(390, 150)">
        <circle cx="0" cy="-30" r="12" fill="none" stroke="black" stroke-width="1.5"/>
        <line x1="0" y1="-18" x2="0" y2="20" stroke="black" stroke-width="1.5"/>
        <line x1="-20" y1="-5" x2="20" y2="-5" stroke="black" stroke-width="1.5"/>
        <line x1="0" y1="20" x2="-15" y2="45" stroke="black" stroke-width="1.5"/>
        <line x1="0" y1="20" x2="15" y2="45" stroke="black" stroke-width="1.5"/>
        <text x="0" y="65" text-anchor="middle" font-size="15">Người dùng</text>
      </g>

      <!-- Connections -->
      <line x1="275" y1="110" x2="360" y2="135" stroke="black" stroke-width="1.5"/>
      <line x1="305" y1="220" x2="360" y2="155" stroke="black" stroke-width="1.5"/>
    </svg>
    <div class="caption">Hình 2.5 Biểu đồ Use Case -Hệ thống</div>
  </div>

</body>
</html>
